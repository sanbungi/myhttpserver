name: Generate CFG PDFs

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-cfg-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate CFG PDFs
        run: ./script/generate_cfg_all_pdf.sh

      - name: Upload CFG PDF artifact
        id: upload_pdf
        uses: actions/upload-artifact@v4
        with:
          name: cfg-pdf-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/cfg/**/*.pdf
          if-no-files-found: error

      - name: Publish PDF links to Job Summary
        env:
          ARTIFACT_URL: ${{ steps.upload_pdf.outputs.artifact-url }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_path:
              raise SystemExit("GITHUB_STEP_SUMMARY is not available")

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          artifact_url = os.environ.get("ARTIFACT_URL", "").strip()
          pdf_files = sorted(Path("dist/cfg").rglob("*.pdf"))

          lines = [
              "## CFG PDF Artifact",
              "",
              f"- Generated PDF count: **{len(pdf_files)}**",
          ]

          if artifact_url:
              lines.append(f"- [Download PDF artifact]({artifact_url})")
          if repo and run_id:
              run_url = f"https://github.com/{repo}/actions/runs/{run_id}"
              lines.append(f"- [Workflow run]({run_url})")

          lines.append("")
          if pdf_files:
              lines.append("### Generated PDF files")
              lines.append("")
              for file_path in pdf_files:
                  lines.append(f"- `{file_path.as_posix()}`")
          else:
              lines.append("No PDF files found in `dist/cfg`.")

          with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

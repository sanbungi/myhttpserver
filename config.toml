[server]
http_port = 8000
https_port = 8443
webroot = "html"
use_ssl = true
also_http = true
keep_alive_timeout = 75
max_workers = 100
request_bytes = 8192

[ssl]
cert_file = "server.crt"
key_file = "server.key"

[logging]
dir = "logs"
system_log = "system.log"
access_log = "access.log"
max_bytes = 10485760
backup_count = 5
system_level = "DEBUG"
access_level = "INFO"

[compression]
priority = ["zstd", "gzip"]
